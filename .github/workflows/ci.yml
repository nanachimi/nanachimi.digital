# ============================================================================
# nanachimi.digital CI/CD Pipeline
# ============================================================================
# Trigger strategy:
#   pull_request  → quality gates only (lint, typecheck, build) — no deploy
#   push develop  → quality gates + E2E + docker + deploy to DEV
#   push staging  → quality gates + E2E + docker + deploy to STAGING
#   push master/main → quality gates + E2E + docker + deploy to PRODUCTION
#
# Jobs:
#   1. lint-and-build      — Lint, type check, build (Next.js)
#   2. e2e-tests           — Playwright E2E tests (PostgreSQL service)
#   3. docker-build        — Build & push image to self-hosted registry
#   4a. deploy-dev         — Deploy to dev (on push to develop)
#   4b. deploy-staging     — Deploy to staging (on push to staging)
#   4c. deploy-prod        — Deploy to production (on push to master/main)
#
# Infrastructure:
#   - Self-hosted runner on Hetzner VPS
#   - Self-hosted Docker registry (localhost:5000)
#   - Local artifact storage (/opt/ci-artifacts)
#   - No GitHub Actions cache/storage/registry used
# ============================================================================

name: CI/CD Pipeline

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
  push:
    branches:
      - develop
      - staging
      - master
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  REGISTRY: localhost:5000
  IMAGE_NAME: localhost:5000/nanachimi-digital

# ===========================================================================
# STAGE 1 — LINT, TYPE CHECK & BUILD
# ===========================================================================
jobs:
  lint-and-build:
    name: "Lint, Type Check & Build"
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Disable Next.js telemetry
        run: npx next telemetry disable

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: NODE_OPTIONS="--max-old-space-size=2048" npm run build
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          NEXT_TELEMETRY_DISABLED: 1

      - name: Store build artifacts locally
        if: github.event_name == 'push'
        run: |
          ARTIFACT_DIR="/opt/ci-artifacts/${{ github.run_id }}"
          mkdir -p "$ARTIFACT_DIR/nextjs-build"
          cp -r .next/standalone "$ARTIFACT_DIR/nextjs-build/"
          cp -r .next/static "$ARTIFACT_DIR/nextjs-build/"
          cp -r public "$ARTIFACT_DIR/nextjs-build/"
          echo "Build artifacts stored in $ARTIFACT_DIR/nextjs-build"

      - name: Generate build summary
        if: always()
        run: |
          echo "# Build — Lint, Type Check & Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| npm ci | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Prisma generate | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Next.js build | ✅ |" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # STAGE 2 — E2E TESTS (deploy branches only)
  # ===========================================================================
  e2e-tests:
    name: "E2E Tests (Playwright)"
    runs-on: self-hosted
    needs: lint-and-build
    if: github.event_name == 'push'
    steps:
      - name: Start PostgreSQL container
        id: postgres
        run: |
          # Clean up any leftover container
          docker rm -f nanachimi-ci-postgres 2>/dev/null || true

          # Kill anything on our port
          fuser -k 15432/tcp 2>/dev/null || true
          sleep 1

          # Start PostgreSQL
          docker run -d \
            --name nanachimi-ci-postgres \
            -p 15432:5432 \
            -e POSTGRES_USER=nanachimi \
            -e POSTGRES_PASSWORD=nanachimi \
            -e POSTGRES_DB=nanachimi \
            postgres:16-alpine

          # Check container is actually running
          sleep 2
          if ! docker ps | grep -q nanachimi-ci-postgres; then
            echo "=== Container failed to start ==="
            docker logs nanachimi-ci-postgres 2>&1 || true
            docker ps -a | grep nanachimi || true
            echo "=== Port check ==="
            ss -tlnp | grep 15432 || true
            exit 1
          fi

          # Wait for PostgreSQL to be ready
          echo "Waiting for PostgreSQL..."
          for i in $(seq 1 20); do
            if docker exec nanachimi-ci-postgres pg_isready -U nanachimi 2>/dev/null; then
              echo "✓ PostgreSQL ready (attempt $i)"
              # Verify from host
              docker exec nanachimi-ci-postgres psql -U nanachimi -c "SELECT 1" nanachimi
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL failed to become ready"
          docker logs nanachimi-ci-postgres
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Disable Next.js telemetry
        run: npx next telemetry disable

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://nanachimi:nanachimi@localhost:15432/nanachimi

      - name: Seed database
        run: npx prisma db seed
        env:
          DATABASE_URL: postgresql://nanachimi:nanachimi@localhost:15432/nanachimi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start dev server for integration tests
        run: |
          npm run dev &
          echo "Waiting for dev server..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Dev server ready (attempt $i)"
              break
            fi
            sleep 2
          done
        env:
          DATABASE_URL: postgresql://nanachimi:nanachimi@localhost:15432/nanachimi
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_TELEMETRY_DISABLED: 1
          SESSION_SECRET: ci-test-session-secret-32-chars-minimum
          AFFILIATE_SESSION_SECRET: ci-test-affiliate-session-secret-32chars
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: ci-test-password

      - name: Integration tests
        run: npm run test:integration
        env:
          TEST_BASE_URL: http://localhost:3000
          DATABASE_URL: postgresql://nanachimi:nanachimi@localhost:15432/nanachimi
          SESSION_SECRET: ci-test-session-secret-32-chars-minimum
          AFFILIATE_SESSION_SECRET: ci-test-affiliate-session-secret-32chars
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: ci-test-password

      - name: Run E2E tests
        id: playwright
        run: set -o pipefail && npx playwright test 2>&1 | tee playwright-output.txt
        env:
          DATABASE_URL: postgresql://nanachimi:nanachimi@localhost:15432/nanachimi
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_TELEMETRY_DISABLED: 1
          SESSION_SECRET: ci-test-session-secret-32-chars-minimum
          AFFILIATE_SESSION_SECRET: ci-test-affiliate-session-secret-32chars
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: ci-test-password

      - name: Generate E2E test summary
        if: always()
        run: |
          echo "# E2E Tests — Playwright" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f playwright-output.txt ]; then
            PASSED=$(grep -oP '\d+(?= passed)' playwright-output.txt | tail -1 || echo "0")
            FAILED=$(grep -oP '\d+(?= failed)' playwright-output.txt | tail -1 || echo "0")
            DURATION=$(grep -oP '[\d.]+[ms]+' playwright-output.txt | tail -1 || echo "—")
            TOTAL=$((${PASSED:-0} + ${FAILED:-0}))
            STATUS=$( [ "${FAILED:-0}" -gt 0 ] && echo '❌' || echo '✅' )
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | ${PASSED:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | ${FAILED:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| Duration | $DURATION |" >> $GITHUB_STEP_SUMMARY
            echo "| Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
            if [ "${FAILED:-0}" -gt 0 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "<details><summary>Failed tests</summary>" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              grep -E '^\s+\d+\)|FAIL|✗|×' playwright-output.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Store Playwright report locally
        if: always()
        run: |
          ARTIFACT_DIR="/opt/ci-artifacts/${{ github.run_id }}"
          mkdir -p "$ARTIFACT_DIR/playwright-report"
          cp -r playwright-report/ "$ARTIFACT_DIR/playwright-report/" 2>/dev/null || true
          cp -r test-results/ "$ARTIFACT_DIR/test-results/" 2>/dev/null || true

      - name: Cleanup PostgreSQL container
        if: always()
        run: |
          docker rm -f nanachimi-ci-postgres 2>/dev/null || true
          pkill -f "next dev" 2>/dev/null || true
          # Clean old node_modules and .next caches from work dirs
          find /opt/nanachimidigital-dev/_work -name ".next" -type d -mmin +60 -exec rm -rf {} + 2>/dev/null || true

  # ===========================================================================
  # STAGE 3 — DOCKER BUILD & PUSH (self-hosted registry)
  # ===========================================================================
  docker-build:
    name: "Docker — Build & Push"
    runs-on: self-hosted
    needs: [lint-and-build, e2e-tests]
    if: github.event_name == 'push'
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure local registry is running
        run: |
          if curl -sf http://localhost:5000/v2/ > /dev/null 2>&1; then
            echo "✓ Registry already running at localhost:5000"
          elif docker start registry 2>/dev/null; then
            echo "✓ Registry container restarted"
            sleep 2
          else
            echo "Creating new registry container..."
            docker rm -f registry 2>/dev/null || true
            docker run -d --name registry --restart unless-stopped -p 5000:5000 registry:2
            sleep 2
            echo "✓ Registry created and started"
          fi

      - name: Extract image tag
        id: meta
        run: echo "version=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build & push Docker image
        run: |
          IMAGE_TAG="${{ steps.meta.outputs.version }}"
          BRANCH_TAG="${{ github.ref_name }}"
          echo "Building ${{ env.IMAGE_NAME }}:${IMAGE_TAG}..."
          docker build -t ${{ env.IMAGE_NAME }}:${IMAGE_TAG} -t ${{ env.IMAGE_NAME }}:${BRANCH_TAG} .
          echo "Pushing to registry..."
          docker push ${{ env.IMAGE_NAME }}:${IMAGE_TAG}
          docker push ${{ env.IMAGE_NAME }}:${BRANCH_TAG}
          echo "✓ Image pushed: ${{ env.IMAGE_NAME }}:${IMAGE_TAG} and :${BRANCH_TAG}"

      - name: Generate Docker build summary
        if: always()
        run: |
          IMAGE_TAG="${{ steps.meta.outputs.version }}"
          echo "# Docker — Built Image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag | Branch Tag | Registry |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|------------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`nanachimi-digital\` | \`${IMAGE_TAG}\` | \`${{ github.ref_name }}\` | Self-hosted (localhost:5000) |" >> $GITHUB_STEP_SUMMARY

      - name: Clean up old artifacts
        if: always()
        run: |
          cd /opt/ci-artifacts
          ls -dt */ 2>/dev/null | tail -n +6 | xargs rm -rf 2>/dev/null || true

      - name: Docker cleanup (prevent disk full)
        if: always()
        run: |
          docker system prune -f --volumes --filter "until=48h" 2>/dev/null || true
          docker image prune -a -f --filter "until=48h" 2>/dev/null || true
          docker builder prune -f --filter "until=48h" 2>/dev/null || true

          # Keep only the latest CI artifact directory
          cd /opt/ci-artifacts 2>/dev/null && ls -dt */ 2>/dev/null | tail -n +2 | xargs rm -rf 2>/dev/null || true

  # ===========================================================================
  # STAGE 4a — DEPLOY DEV (auto on push to develop)
  # ===========================================================================
  deploy-dev:
    name: "Deploy → Dev"
    runs-on: self-hosted
    needs: docker-build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: dev
      url: https://dev.nanachimi.digital
    steps:
      - name: Deploy to dev via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.NONPROD_HOST }}
          username: ${{ vars.NONPROD_USER }}
          key: ${{ secrets.NONPROD_SSH_KEY }}
          envs: DEV_DATABASE_URL,DEV_ANTHROPIC_API_KEY,DEV_ADMIN_PASSWORD,DEV_SESSION_SECRET,DEV_STRIPE_SECRET_KEY
          script: |
            set -e
            IMAGE_TAG="${{ needs.docker-build.outputs.image-tag }}"
            REGISTRY="${{ vars.REGISTRY_HOST }}"
            ENV_DIR="/opt/nanachimidigital-dev"
            DB_CONTAINER="nanachimidigital-dev-db"
            DB_USER="nanachimi"
            DB_PASS="ncd_dev_$(hostname | md5sum | cut -c1-12)"
            DB_NAME="nanachimi_dev"

            # --- Bootstrap infrastructure (idempotent) ---
            docker network create nanachimidigital-network 2>/dev/null || true
            mkdir -p ${ENV_DIR}
            SEAWEED_CONTAINER="nanachimidigital-dev-seaweedfs"
            MAILHOG_CONTAINER="nanachimidigital-dev-mailhog"

            # Start dev PostgreSQL if not running
            if ! docker ps --format '{{.Names}}' | grep -q "^${DB_CONTAINER}$"; then
              docker rm -f ${DB_CONTAINER} 2>/dev/null || true
              docker run -d \
                --name ${DB_CONTAINER} \
                --network nanachimidigital-network \
                --restart unless-stopped \
                -e POSTGRES_USER=${DB_USER} \
                -e POSTGRES_PASSWORD=${DB_PASS} \
                -e POSTGRES_DB=${DB_NAME} \
                -v nanachimidigital-dev-pgdata:/var/lib/postgresql/data \
                postgres:16-alpine
              echo "✓ Dev database started"
              sleep 5
            else
              echo "✓ Dev database already running"
              DB_PASS=$(docker exec ${DB_CONTAINER} printenv POSTGRES_PASSWORD)
            fi

            # Start SeaweedFS if not running
            if ! docker ps --format '{{.Names}}' | grep -q "^${SEAWEED_CONTAINER}$"; then
              docker rm -f ${SEAWEED_CONTAINER} 2>/dev/null || true
              docker run -d \
                --name ${SEAWEED_CONTAINER} \
                --network nanachimidigital-network \
                --restart unless-stopped \
                -v nanachimidigital-dev-seaweed:/data \
                chrislusf/seaweedfs:latest \
                server -master -volume -filer -dir=/data
              echo "✓ SeaweedFS started"
            else
              echo "✓ SeaweedFS already running"
            fi

            # Start MailHog if not running
            if ! docker ps --format '{{.Names}}' | grep -q "^${MAILHOG_CONTAINER}$"; then
              docker rm -f ${MAILHOG_CONTAINER} 2>/dev/null || true
              docker run -d \
                --name ${MAILHOG_CONTAINER} \
                --network nanachimidigital-network \
                --restart unless-stopped \
                -p 8025:8025 \
                mailhog/mailhog:latest
              echo "✓ MailHog started (UI: http://$(hostname -I | awk '{print $1}'):8025)"
            else
              echo "✓ MailHog already running"
            fi

            DATABASE_URL="postgresql://${DB_USER}:${DB_PASS}@${DB_CONTAINER}:5432/${DB_NAME}"

            # Generate .env (always overwrite to pick up secret changes)
            cat > ${ENV_DIR}/.env << ENVEOF
            DATABASE_URL=${DATABASE_URL}
            NEXT_PUBLIC_SITE_URL=https://dev.nanachimi.digital
            ANTHROPIC_API_KEY=${{ secrets.DEV_ANTHROPIC_API_KEY }}
            SEAWEEDFS_MASTER_URL=http://${SEAWEED_CONTAINER}:9333
            SEAWEEDFS_FILER_URL=http://${SEAWEED_CONTAINER}:8888
            SMTP_HOST=${MAILHOG_CONTAINER}
            SMTP_PORT=1025
            SMTP_SECURE=false
            EMAIL_FROM=nanachimi.digital <info@nanachimi.digital>
            ADMIN_USERNAME=admin
            ADMIN_PASSWORD=${{ secrets.DEV_ADMIN_PASSWORD }}
            SESSION_SECRET=${{ secrets.DEV_SESSION_SECRET }}
            STRIPE_SECRET_KEY=${{ secrets.DEV_STRIPE_SECRET_KEY }}
            NEXT_TELEMETRY_DISABLED=1
            ENVEOF
            # Remove leading whitespace and quotes from heredoc values
            sed -i 's/^[[:space:]]*//' ${ENV_DIR}/.env
            sed -i 's/="\(.*\)"$/=\1/' ${ENV_DIR}/.env
            echo "✓ .env written"

            # --- Deploy application ---
            docker pull ${REGISTRY}/nanachimi-digital:${IMAGE_TAG}
            docker tag ${REGISTRY}/nanachimi-digital:${IMAGE_TAG} nanachimi-digital:dev

            docker stop nanachimi-dev 2>/dev/null || true
            docker rm nanachimi-dev 2>/dev/null || true

            # Backfill NULL idempotency keys + run migrations
            docker run --rm \
              --network nanachimidigital-network \
              -e DATABASE_URL="${DATABASE_URL}" \
              nanachimi-digital:dev \
              npx prisma db execute --file prisma/migrations/001_backfill_idempotency_key.sql 2>/dev/null || true
            docker run --rm \
              --network nanachimidigital-network \
              -e DATABASE_URL="${DATABASE_URL}" \
              nanachimi-digital:dev \
              sh -c "npx prisma migrate deploy && npx prisma db seed"
            echo "✓ Migrations + seed applied"

            # Start app
            docker run -d \
              --name nanachimi-dev \
              --network nanachimidigital-network \
              --restart unless-stopped \
              -p 3001:3000 \
              --env-file ${ENV_DIR}/.env \
              nanachimi-digital:dev
            echo "✓ App container started"

            docker system prune -f

      - name: Dev smoke test
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.NONPROD_HOST }}
          username: ${{ vars.NONPROD_USER }}
          key: ${{ secrets.NONPROD_SSH_KEY }}
          script: |
            echo "Waiting for dev to start..."
            for i in $(seq 1 12); do
              HTTP_STATUS=$(curl -so /dev/null -w "%{http_code}" http://localhost:3001/ 2>/dev/null || echo "000")
              if [ "$HTTP_STATUS" -gt 0 ] && [ "$HTTP_STATUS" -lt 500 ]; then
                echo "Dev is up (HTTP $HTTP_STATUS on attempt $i)"
                exit 0
              fi
              echo "Attempt $i/12 — HTTP $HTTP_STATUS — waiting 10s..."
              sleep 10
            done
            echo "Dev health check FAILED"
            docker logs nanachimi-dev --tail 30
            exit 1

  # ===========================================================================
  # STAGE 4b — DEPLOY STAGING (auto on push to staging)
  # ===========================================================================
  deploy-staging:
    name: "Deploy → Staging"
    runs-on: self-hosted
    needs: docker-build
    if: github.ref == 'refs/heads/staging'
    environment:
      name: staging
      url: https://staging.nanachimi.digital
    steps:
      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.NONPROD_HOST }}
          username: ${{ vars.NONPROD_USER }}
          key: ${{ secrets.NONPROD_SSH_KEY }}
          script: |
            set -e
            IMAGE_TAG="${{ needs.docker-build.outputs.image-tag }}"
            REGISTRY="${{ vars.REGISTRY_HOST }}"
            ENV_DIR="/opt/nanachimidigital-staging"
            DB_CONTAINER="nanachimidigital-staging-db"
            DB_USER="nanachimi"
            DB_PASS="ncd_staging_$(hostname | md5sum | cut -c1-12)"
            DB_NAME="nanachimi_staging"

            docker network create nanachimidigital-network 2>/dev/null || true
            mkdir -p ${ENV_DIR}

            if ! docker ps --format '{{.Names}}' | grep -q "^${DB_CONTAINER}$"; then
              docker rm -f ${DB_CONTAINER} 2>/dev/null || true
              docker run -d \
                --name ${DB_CONTAINER} \
                --network nanachimidigital-network \
                --restart unless-stopped \
                -e POSTGRES_USER=${DB_USER} \
                -e POSTGRES_PASSWORD=${DB_PASS} \
                -e POSTGRES_DB=${DB_NAME} \
                -v nanachimidigital-staging-pgdata:/var/lib/postgresql/data \
                postgres:16-alpine
              echo "✓ Staging database started"
              sleep 5
            else
              echo "✓ Staging database already running"
              DB_PASS=$(docker exec ${DB_CONTAINER} printenv POSTGRES_PASSWORD)
            fi

            DATABASE_URL="postgresql://${DB_USER}:${DB_PASS}@${DB_CONTAINER}:5432/${DB_NAME}"

            cat > ${ENV_DIR}/.env << ENVEOF
            DATABASE_URL=${DATABASE_URL}
            NEXT_PUBLIC_SITE_URL=https://staging.nanachimi.digital
            ANTHROPIC_API_KEY=${{ secrets.STAGING_ANTHROPIC_API_KEY }}
            SMTP_HOST=localhost
            SMTP_PORT=1025
            SMTP_SECURE=false
            EMAIL_FROM=nanachimi.digital <info@nanachimi.digital>
            ADMIN_USERNAME=admin
            ADMIN_PASSWORD=${{ secrets.STAGING_ADMIN_PASSWORD }}
            SESSION_SECRET=${{ secrets.STAGING_SESSION_SECRET }}
            STRIPE_SECRET_KEY=${{ secrets.STAGING_STRIPE_SECRET_KEY }}
            NEXT_TELEMETRY_DISABLED=1
            ENVEOF
            sed -i 's/^[[:space:]]*//' ${ENV_DIR}/.env
            sed -i 's/="\(.*\)"$/=\1/' ${ENV_DIR}/.env
            echo "✓ .env written"

            docker pull ${REGISTRY}/nanachimi-digital:${IMAGE_TAG}
            docker tag ${REGISTRY}/nanachimi-digital:${IMAGE_TAG} nanachimi-digital:staging

            docker stop nanachimi-staging 2>/dev/null || true
            docker rm nanachimi-staging 2>/dev/null || true

            docker run --rm \
              --network nanachimidigital-network \
              -e DATABASE_URL="${DATABASE_URL}" \
              nanachimi-digital:staging \
              npx prisma db execute --file prisma/migrations/001_backfill_idempotency_key.sql 2>/dev/null || true
            docker run --rm \
              --network nanachimidigital-network \
              -e DATABASE_URL="${DATABASE_URL}" \
              nanachimi-digital:staging \
              npx prisma migrate deploy
            echo "✓ Migrations applied"

            docker run -d \
              --name nanachimi-staging \
              --network nanachimidigital-network \
              --restart unless-stopped \
              -p 3002:3000 \
              --env-file ${ENV_DIR}/.env \
              nanachimi-digital:staging
            echo "✓ App container started"

            docker system prune -f

      - name: Staging smoke test
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.NONPROD_HOST }}
          username: ${{ vars.NONPROD_USER }}
          key: ${{ secrets.NONPROD_SSH_KEY }}
          script: |
            echo "Waiting for staging to start..."
            for i in $(seq 1 12); do
              HTTP_STATUS=$(curl -so /dev/null -w "%{http_code}" http://localhost:3002/ 2>/dev/null || echo "000")
              if [ "$HTTP_STATUS" -gt 0 ] && [ "$HTTP_STATUS" -lt 500 ]; then
                echo "Staging is up (HTTP $HTTP_STATUS on attempt $i)"
                exit 0
              fi
              echo "Attempt $i/12 — HTTP $HTTP_STATUS — waiting 10s..."
              sleep 10
            done
            echo "Staging health check FAILED"
            docker logs nanachimi-staging --tail 30
            exit 1

  # ===========================================================================
  # STAGE 4c — DEPLOY PRODUCTION (on push to master/main)
  # ===========================================================================
  deploy-prod:
    name: "Deploy → Production"
    runs-on: self-hosted
    needs: docker-build
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    environment:
      name: prod
      url: https://nanachimi.digital
    steps:
      - name: Deploy to prod via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.PROD_HOST }}
          username: ${{ vars.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            IMAGE_TAG="${{ needs.docker-build.outputs.image-tag }}"
            REGISTRY="${{ vars.REGISTRY_HOST }}"
            ENV_DIR="/opt/nanachimi-digital"
            DB_CONTAINER="nanachimi-digital-prod-db"
            DB_USER="nanachimi_digital"
            DB_NAME="nanachimi_digital"
            APP_CONTAINER="nanachimi-digital-prod-app"
            SEAWEED_CONTAINER="nanachimi-digital-prod-seaweedfs"
            NETWORK="nanachimi-digital-network"

            # --- Bootstrap infrastructure (idempotent) ---
            docker network create ${NETWORK} 2>/dev/null || true
            mkdir -p ${ENV_DIR}/data/postgres ${ENV_DIR}/data/seaweedfs ${ENV_DIR}/backups

            # Read DB password from .env
            DB_PASS=$(grep -oP 'POSTGRES_PASSWORD=\K.*' ${ENV_DIR}/.env 2>/dev/null || echo "nanachimi_digital_prod")

            # Start PostgreSQL if not running
            if ! docker ps --format '{{.Names}}' | grep -q "^${DB_CONTAINER}$"; then
              docker rm -f ${DB_CONTAINER} 2>/dev/null || true
              docker run -d \
                --name ${DB_CONTAINER} \
                --network ${NETWORK} \
                --restart unless-stopped \
                -e POSTGRES_USER=${DB_USER} \
                -e POSTGRES_PASSWORD=${DB_PASS} \
                -e POSTGRES_DB=${DB_NAME} \
                -v ${ENV_DIR}/data/postgres:/var/lib/postgresql/data \
                postgres:16-alpine
              echo "✓ Prod database started"
              sleep 5
            else
              echo "✓ Prod database already running"
            fi

            # Start SeaweedFS if not running
            if ! docker ps --format '{{.Names}}' | grep -q "^${SEAWEED_CONTAINER}$"; then
              docker rm -f ${SEAWEED_CONTAINER} 2>/dev/null || true
              docker run -d \
                --name ${SEAWEED_CONTAINER} \
                --network ${NETWORK} \
                --restart unless-stopped \
                -v ${ENV_DIR}/data/seaweedfs:/data \
                chrislusf/seaweedfs:latest \
                server -master -volume -filer -dir=/data
              echo "✓ SeaweedFS started"
            else
              echo "✓ SeaweedFS already running"
            fi

            # Backup database before deploy
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            docker exec ${DB_CONTAINER} pg_dump -U ${DB_USER} ${DB_NAME} \
              | gzip > ${ENV_DIR}/backups/pre_deploy_${TIMESTAMP}.sql.gz 2>/dev/null || true
            cd ${ENV_DIR}/backups && ls -t *.sql.gz 2>/dev/null | tail -n +11 | xargs rm -f 2>/dev/null || true
            echo "✓ Backup: pre_deploy_${TIMESTAMP}.sql.gz"

            # Upload backup to off-site S3 storage (no-op if not configured)
            if [ -f "${ENV_DIR}/backups/pre_deploy_${TIMESTAMP}.sql.gz" ]; then
              docker run --rm \
                --env-file ${ENV_DIR}/.env \
                -v ${ENV_DIR}/backups:/backups:ro \
                -v ${ENV_DIR}/scripts:/scripts:ro \
                --entrypoint sh \
                amazon/aws-cli:latest \
                /scripts/backup-upload.sh "/backups/pre_deploy_${TIMESTAMP}.sql.gz" 2>/dev/null || true
            fi

            # --- Deploy application ---
            docker pull ${REGISTRY}/nanachimi-digital:${IMAGE_TAG}
            docker tag ${REGISTRY}/nanachimi-digital:${IMAGE_TAG} nanachimi-digital:prod

            docker stop ${APP_CONTAINER} 2>/dev/null || true
            docker rm ${APP_CONTAINER} 2>/dev/null || true

            # Backfill NULL idempotency keys + run migrations
            docker run --rm \
              --network ${NETWORK} \
              --env-file ${ENV_DIR}/.env \
              nanachimi-digital:prod \
              npx prisma db execute --file prisma/migrations/001_backfill_idempotency_key.sql 2>/dev/null || true
            docker run --rm \
              --network ${NETWORK} \
              --env-file ${ENV_DIR}/.env \
              nanachimi-digital:prod \
              sh -c "npx prisma migrate deploy && npx prisma db seed"
            echo "✓ Migrations + seed applied"

            # Start app
            docker run -d \
              --name ${APP_CONTAINER} \
              --network ${NETWORK} \
              --restart unless-stopped \
              -p 3000:3000 \
              --env-file ${ENV_DIR}/.env \
              nanachimi-digital:prod
            echo "✓ App container started"

            docker system prune -f

      - name: Prod smoke test
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.PROD_HOST }}
          username: ${{ vars.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            echo "Waiting for prod to start..."
            for i in $(seq 1 12); do
              HTTP_STATUS=$(curl -so /dev/null -w "%{http_code}" http://localhost:3000/ 2>/dev/null || echo "000")
              if [ "$HTTP_STATUS" -gt 0 ] && [ "$HTTP_STATUS" -lt 500 ]; then
                echo "Prod is up (HTTP $HTTP_STATUS on attempt $i)"
                exit 0
              fi
              echo "Attempt $i/12 — HTTP $HTTP_STATUS — waiting 10s..."
              sleep 10
            done
            echo "Prod health check FAILED"
            docker logs nanachimi-digital-prod-app --tail 30
            exit 1

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.PROD_HOST }}
          username: ${{ vars.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            echo "=== ROLLBACK TRIGGERED ==="
            docker stop nanachimi-digital-prod-app 2>/dev/null || true
            docker rm nanachimi-digital-prod-app 2>/dev/null || true
            PREV_IMAGE=$(docker images nanachimi-digital --format '{{.Tag}}' | grep -v prod | head -1)
            if [ -n "$PREV_IMAGE" ]; then
              echo "Rolling back to nanachimi-digital:${PREV_IMAGE}"
              docker run -d \
                --name nanachimi-digital-prod-app \
                --network nanachimi-digital-network \
                --restart unless-stopped \
                -p 3000:3000 \
                --env-file /opt/nanachimi-digital/.env \
                nanachimi-digital:${PREV_IMAGE}
              echo "✓ Rollback complete"
            else
              echo "No previous image found for rollback!"
            fi
