services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://nanachimi:nanachimi@db:5432/nanachimi
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nanachimi
      POSTGRES_PASSWORD: nanachimi
      POSTGRES_DB: nanachimi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nanachimi"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
